<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- ナビバー -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Fit Deli</a>

        <div class="d-flex">
            <form th:action="@{/logout}" method="post" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-light btn-sm">ログアウト</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="row">

        <!-- 左メニュー -->
        <div class="col-3">
            <div class="list-group">
                <a href="/mypage" class="list-group-item list-group-item-action">マイページ</a>
                <a href="/orders" class="list-group-item list-group-item-action">注文履歴</a>
                <a href="/products" class="list-group-item list-group-item-action active">商品一覧</a>
            </div>
        </div>

        <!-- メインコンテンツ -->
        <div class="col-9">
            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="mb-3">商品一覧</h4>

                    <div class="row" th:if="${products != null and products.size() > 0}">
                        <div class="col-md-4 mb-4" th:each="product : ${products}">
                            <div class="card h-100">

                                <!-- 商品画像 -->
                                <img th:src="@{${product.imagePath != null ? product.imagePath : '/images/noimage.png'}}"
                                     class="card-img-top"
                                     style="height: 200px; object-fit: contain; background: #fff;">

                                <div class="card-body">
                                    <h5 class="card-title" th:text="${product.name}"></h5>
                                    <p class="card-text text-primary fw-bold"
                                       th:text="${#numbers.formatInteger(product.price)} + '円'"></p>
                                </div>

                                <div class="card-footer bg-white">
                                    <a th:href="@{'/products/' + ${product.id}}"
                                       class="btn btn-outline-primary w-100 btn-sm">
                                        詳細を見る
                                    </a>
                                </div>

                            </div>
                        </div>
                    </div>

                    <p th:if="${products == null or products.size() == 0}" class="text-muted">
                        商品が登録されていません。
                    </p>

                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
