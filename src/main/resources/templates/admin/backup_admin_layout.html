<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>管理画面</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #ddd;
        }

        .main-content {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="sidebar">

    <h4 class="fw-bold mb-4">Admin Menu</h4>

    <div class="nav flex-column">
        <a href="/admin/dashboard" class="nav-link">Dashboard</a>
        <a href="/admin/products" class="nav-link">Products</a>
        <a href="/admin/orders" class="nav-link">Orders</a>
    </div>

    <form th:action="@{/logout}" method="post" class="mt-4">
        <button type="submit" class="btn btn-outline-danger w-100">
            ログアウト
        </button>
    </form>

</div>

<div class="main-content" th:fragment="content">
    <div th:insert="${content}"></div>
</div>

</body>
</html>
