<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>商品詳細</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            margin: 0;
            background: #f5f6f8;
        }

        .wrapper {
            display: flex;
            min-height: calc(100vh - 56px);
        }

        .sidebar {
            width: 220px;
            background: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #ddd;
        }

        .main-content {
            flex: 1;
            padding: 20px;
        }
        .btn {
            border-radius: 10px;
        }

    </style>

</head>

<body>

<!-- header -->
<div th:replace="admin/fragments/header :: header"></div>

<div class="wrapper">

    <!-- sidebar -->
    <div th:replace="admin/fragments/sidebar :: sidebar"></div>

    <!-- content -->
    <div class="main-content">

        <h2 class="mb-4 border-bottom pb-2">
            商品詳細
        </h2>

        <div class="card shadow-sm border-0 rounded-4">

            <div class="card-body">

                <div class="row">

                    <div class="col-md-4">

                        <img th:if="${product.image != null}"
                             th:src="@{'/uploads/product/' + ${product.image}}"
                             class="img-fluid rounded"
                             style="width:100%; max-height: 320px; object-fit: cover; border-radius: 12px;">

                        <img th:unless="${product.image != null}"
                             src="/images/noimage.png"
                             class="img-fluid rounded"
                             style="width:100%; max-height: 320px; object-fit: cover; border-radius: 12px;">

                    </div>

                    <div class="col-md-8">

                        <table class="table table-bordered align-middle mb-0">

                            <tr>
                                <th style="width: 180px;">ID</th>
                                <td th:text="${product.id}"></td>
                            </tr>

                            <tr>
                                <th>商品名</th>
                                <td th:text="${product.name}"></td>
                            </tr>

                            <tr>
                                <th>価格</th>
                                <td th:text="${product.price} + '円'"></td>
                            </tr>

                            <tr>
                                <th>在庫</th>
                                <td th:text="${product.stock}"></td>
                            </tr>

                            <tr>
                                <th>カテゴリ</th>
                                <td th:text="${product.category}"></td>
                            </tr>

                            <tr>

                                <th>説明</th>
                                <td style="white-space: pre-wrap;"
                                    th:text="${product.description}">
                                </td>
                            </tr>
                            <tr>
                                <th>状態</th>
                                <td>
                                    <span th:if="${product.stock > 0}"
                                          class="badge bg-success">
                                        在庫あり
                                    </span>
                                    <span th:if="${product.stock <= 0}"
                                          class="badge bg-danger">
                                        在庫切れ
                                    </span>
                                </td>
                            </tr>

                        </table>
                        <div class="mt-3">

                            <a th:href="@{'/admin/products/edit/' + ${product.id}}"
                               class="btn btn-primary">
                                編集
                            </a>

                            <a href="/admin/products"
                               class="btn btn-secondary">
                                一覧へ戻る
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
