<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品追加（管理者）</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="mb-4 border-bottom pb-2">商品を追加</h2>

<form th:action="@{/admin/products/save}" th:object="${product}" method="post">

    <div class="mb-3">
        <label class="form-label">商品名</label>
        <input type="text" th:field="*{name}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">説明</label>
        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">価格</label>
        <input type="number" th:field="*{price}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">在庫</label>
        <input type="number" th:field="*{stock}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">画像URL（任意）</label>
        <input type="text" th:field="*{imageUrl}" class="form-control">
    </div>

    <button class="btn btn-primary">保存する</button>
    <a href="/admin/products" class="btn btn-secondary ms-2">戻る</a>

</form>

</body>
</html>
