<form th:action="@{'/admin/products/edit/' + ${product.id}}"
      method="post"
      enctype="multipart/form-data">

    <div class="mb-3">

        <label class="form-label">
            商品名
        </label>

        <input type="text"
               name="name"
               class="form-control"
               th:value="${product.name}">

    </div>

    <div class="mb-3">

        <label class="form-label">
            価格
        </label>

        <input type="number"
               name="price"
               class="form-control"
               th:value="${product.price}">

    </div>

    <div class="mb-3">

        <label class="form-label">
            在庫
        </label>

        <input type="number"
               name="stock"
               class="form-control"
               th:value="${product.stock}">

    </div>

    <div class="mb-3">

        <label class="form-label">
            カテゴリ
        </label>

        <select name="category"
                class="form-select">

            <option th:each="c : ${categories}"
                    th:value="${c.name}"
                    th:text="${c.name}"
                    th:selected="${product.category == c.name}">
            </option>

        </select>

    </div>

    <div class="mb-3">

        <label class="form-label">
            商品画像
        </label>

        <input type="file"
               name="image"
               class="form-control"
               accept="image/*">

    </div>

    <div class="d-flex gap-2">

    <button class="btn btn-primary">
        更新
    </button>

        <a href="/admin/products"
           class="btn btn-secondary">
            一覧へ戻る
        </a>

    </div>

</form>
