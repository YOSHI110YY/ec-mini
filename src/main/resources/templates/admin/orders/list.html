<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>注文管理</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            margin: 0;
            background: #f5f6f8;
        }

        .wrapper {
            display: flex;
            min-height: calc(100vh - 56px);
        }

        .sidebar {
            width: 220px;
            background: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #ddd;
        }

        .main-content {
            flex: 1;
            padding: 20px;
        }

    </style>

</head>

<body>

<div th:replace="admin/fragments/header :: header"></div>

<div class="wrapper">

    <div th:replace="admin/fragments/sidebar :: sidebar"></div>

    <div class="main-content">

        <h2 class="mb-4 border-bottom pb-2">
            注文管理
        </h2>

        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-0">

                <div class="table-responsive">

                    <table class="table table-hover align-middle mb-0">

                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>注文者</th>
                            <th>合計金額</th>
                            <th>注文日時</th>
                            <th>ステータス</th>
                            <th>操作</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="o : ${orders}">

                            <td th:text="${o.id}"></td>

                            <td th:text="${o.username}"></td>

                            <td th:text="${o.totalPrice} + '円'"></td>

                            <td th:text="${#temporals.format(o.createdAt, 'yyyy/MM/dd HH:mm')}"></td>

                            <td>

                           <span th:if="${o.status == 'ORDERED'}"
                                 class="badge bg-warning text-dark">
                                 ORDERED
                           </span>

                                <span th:if="${o.status == 'SHIPPED'}"
                                      class="badge bg-success">
                                     SHIPPED
                               </span>

                                <span th:if="${o.status == 'CANCELED'}"
                                      class="badge bg-danger">
                                      CANCELED
                                </span>

                                <span th:if="${o.status == null}"
                                      class="badge bg-secondary">
                                      未設定
                                </span>
                            </td>
                            <td>
                                <a th:href="@{'/admin/orders/' + ${o.id}}"
                                   class="btn btn-sm btn-outline-secondary">
                                    詳細
                                </a>

                                <a th:if="${o.status != 'SHIPPED'}"
                                   th:href="@{'/admin/orders/ship/' + ${o.id}}"
                                   class="btn btn-sm btn-success">
                                    発送済み
                                </a>

                            </td>

                        </tr>
                        </tbody>

                    </table>

                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
