<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>注文詳細</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            margin: 0;
        }

        .wrapper {
            display: flex;
            min-height: calc(100vh - 56px);
        }

        .sidebar {
            width: 220px;
            background: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #ddd;
        }

        .main-content {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>

<body>

<div th:replace="admin/fragments/header :: header"></div>

<div class="wrapper">

    <div th:replace="admin/fragments/sidebar :: sidebar"></div>

    <div class="main-content">

        <h2 class="mb-4 border-bottom pb-2">
            注文詳細
        </h2>

        <div class="card shadow-sm mb-4">
            <div class="card-body">

                <table class="table table-bordered mb-0">

                    <tr>
                        <th style="width: 180px;">注文ID</th>
                        <td th:text="${order.id}"></td>
                    </tr>

                    <tr>
                        <th>注文者</th>
                        <td th:text="${order.username}"></td>
                    </tr>

                    <tr>
                        <th>合計金額</th>
                        <td th:text="${order.totalPrice} + '円'"></td>
                    </tr>

                    <tr>
                        <th>注文日時</th>
                        <td th:text="${#temporals.format(order.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
                    </tr>

                    <tr>
                        <th>ステータス</th>
                        <td>
                            <span th:if="${order.status == 'ORDERED'}"
                                  class="badge bg-warning text-dark">
                                ORDERED
                            </span>

                            <span th:if="${order.status == 'SHIPPED'}"
                                  class="badge bg-success">
                                SHIPPED
                            </span>

                            <span th:if="${order.status == 'CANCELED'}"
                                  class="badge bg-danger">
                                CANCELED
                            </span>

                            <span th:if="${order.status == null}"
                                  class="badge bg-secondary">
                                未設定
                            </span>
                        </td>
                    </tr>

                </table>

            </div>
        </div>

        <h4 class="mb-3">
            注文商品
        </h4>

        <div class="table-responsive">

            <table class="table table-striped table-bordered table-hover align-middle">

                <thead>
                <tr>
                    <th>商品名</th>
                    <th>数量</th>
                    <th>価格</th>
                    <th>小計</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.productName}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${item.price} + '円'"></td>
                    <td th:text="${item.subtotal} + '円'"></td>
                </tr>
                </tbody>

            </table>

        </div>

        <div class="d-flex gap-2 mt-4">

            <a th:href="@{'/admin/orders/ship/' + ${order.id}}"
               class="btn btn-success"
               th:if="${order.status != 'SHIPPED'}">
                発送済みにする
            </a>

            <a href="/admin/orders"
               class="btn btn-secondary">
                一覧へ戻る
            </a>

        </div>

    </div>

</div>

</body>
</html>
