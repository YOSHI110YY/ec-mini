<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="admin/backup_admin_layout :: content(~{::body})">

<h2 class="mb-4 border-bottom pb-2">カテゴリ編集</h2>

<form th:action="@{'/admin/categories/edit/' + ${category.id}}" method="post">
    <div class="mb-3">
        <label class="form-label">カテゴリ名</label>
        <input type="text" name="name" class="form-control" th:value="${category.name}" required>
    </div>

    <button class="btn btn-primary">更新</button>
</form>

</html>
