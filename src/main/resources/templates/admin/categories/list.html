<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="admin/backup_admin_layout :: content(~{::body})">

<h2 class="mb-4 border-bottom pb-2">カテゴリ管理</h2>

<a href="/admin/categories/new" class="btn btn-primary mb-3">＋ カテゴリ追加</a>

<!-- PC表示 -->
<div class="table-responsive d-none d-md-block">
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>カテゴリ名</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${categories}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.name}"></td>
            <td>
                <a th:href="@{'/admin/categories/edit/' + ${c.id}}" class="btn btn-sm btn-outline-primary">編集</a>
                <a th:href="@{'/admin/categories/delete/' + ${c.id}}"
                   onclick="return confirm('削除しますか？');"
                   class="btn btn-sm btn-outline-danger">削除</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- スマホ表示 -->
<div class="d-md-none">
    <div class="card mb-3" th:each="c : ${categories}">
        <div class="card-body">
            <h5 class="fw-bold" th:text="${c.name}"></h5>

            <a th:href="@{'/admin/categories/edit/' + ${c.id}}" class="btn btn-outline-primary w-100 mt-2">編集</a>
            <a th:href="@{'/admin/categories/delete/' + ${c.id}}"
               onclick="return confirm('削除しますか？');"
               class="btn btn-outline-danger w-100 mt-2">削除</a>
        </div>
    </div>
</div>

</html>
