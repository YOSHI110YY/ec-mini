<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="admin/backup_admin_layout :: content(~{::body})">

<h2 class="mb-4 border-bottom pb-2">会員詳細</h2>

<!-- PC表示：表形式 -->
<div class="d-none d-md-block mb-4">
    <table class="table table-bordered">
        <tr>
            <th style="width: 200px;">ユーザーID</th>
            <td th:text="${user.id}"></td>
        </tr>
        <tr>
            <th>ユーザー名</th>
            <td th:text="${user.username}"></td>
        </tr>
        <tr>
            <th>メール</th>
            <td th:text="${user.email}"></td>
        </tr>
        <tr>
            <th>登録日</th>
            <td th:text="${#temporals.format(user.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
        </tr>
        <tr>
            <th>権限</th>
            <td th:text="${user.role}"></td>
        </tr>
    </table>
</div>

<!-- スマホ表示：カード形式 -->
<div class="d-md-none">
    <div class="card mb-3 shadow-sm">
        <div class="card-body">
            <h5 class="fw-bold">ユーザー名：<span th:text="${user.username}"></span></h5>

            <p class="mb-1">ID：<span th:text="${user.id}"></span></p>
            <p class="mb-1">メール：<span th:text="${user.email}"></span></p>
            <p class="mb-1">登録日：
                <span th:text="${#temporals.format(user.createdAt, 'yyyy/MM/dd HH:mm')}"></span>
            </p>
            <p class="mb-1">権限：<span th:text="${user.role}"></span></p>
        </div>
    </div>
</div>

<!-- 権限変更フォーム -->
<h4 class="mt-4">権限変更</h4>

<form th:action="@{'/admin/users/update/' + ${user.id}}" method="post" class="mb-4" style="max-width: 300px;">
    <div class="input-group">
        <select name="role" class="form-select">
            <option value="USER" th:selected="${user.role == 'USER'}">一般ユーザー</option>
            <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">管理者</option>
        </select>
        <button class="btn btn-primary">更新</button>
    </div>
</form>

<!-- 購入履歴 -->
<h4 class="mt-4 mb-3">購入履歴</h4>

<!-- PC表示：表形式 -->
<div class="table-responsive d-none d-md-block">
    <table class="table table-striped align-middle">
        <thead>
        <tr>
            <th>注文ID</th>
            <th>合計金額</th>
            <th>注文日</th>
            <th>ステータス</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o : ${user.orders}">
            <td th:text="${o.id}"></td>
            <td th:text="${o.totalPrice} + '円'"></td>
            <td th:text="${#temporals.format(o.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
            <td th:text="${o.status}"></td>
            <td>
                <a th:href="@{'/admin/orders/' + ${o.id}}" class="btn btn-sm btn-outline-primary">詳細</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- スマホ表示：カード形式 -->
<div class="d-md-none">
    <div class="card mb-3 shadow-sm" th:each="o : ${user.orders}">
        <div class="card-body">
            <h5 class="fw-bold">注文ID：<span th:text="${o.id}"></span></h5>

            <p class="mb-1">合計金額：<span th:text="${o.totalPrice}"></span>円</p>
            <p class="mb-1">注文日：
                <span th:text="${#temporals.format(o.createdAt, 'yyyy/MM/dd HH:mm')}"></span>
            </p>
            <p class="mb-1">ステータス：<span th:text="${o.status}"></span></p>

            <a th:href="@{'/admin/orders/' + ${o.id}}" class="btn btn-outline-primary w-100 mt-2">
                詳細を見る
            </a>
        </div>
    </div>
</div>

</html>
