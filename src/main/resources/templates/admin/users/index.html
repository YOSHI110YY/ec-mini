<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザー管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { width: 200px; height: 100vh; background: #343a40; padding-top: 20px; position: fixed; top: 0; left: 0; }
        .sidebar a { color: #fff; display: block; padding: 10px 20px; text-decoration: none; }
        .sidebar a:hover { background: #495057; }
        .main-content { margin-left: 220px; padding: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="/admin/products">商品管理</a>
    <a href="/admin/orders">注文管理</a>
    <a href="/admin/users">ユーザー管理</a>
    <a href="/products">サイトを見る</a>
</div>

<div class="main-content">
    <h1 class="mb-4">ユーザー管理</h1>

    <table class="table table-striped table-bordered">
        <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>ユーザー名</th>
            <th>メールアドレス</th>
            <th>権限</th>
        </tr>
        </thead>
        <tbody>
        <!-- 'users' は Controller で model.addAttribute("users", ...) した名前 -->
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <!-- email や role が User エンティティにある場合 -->
            <td th:text="${u.email}"></td>
            <td th:text="${u.role}"></td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
