<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="admin/backup_admin_layout :: content(~{::body})">

<body>

<h2 class="mb-4 border-bottom pb-2">会員管理</h2>

<!-- PC表示：表形式 -->
<div class="table-responsive d-none d-md-block">
    <table class="table table-striped align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>ユーザー名</th>
            <th>メール</th>
            <th>登録日</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${#temporals.format(u.createdAt, 'yyyy/MM/dd')}"></td>
            <td>
                <a th:href="@{'/admin/users/' + ${u.id}}" class="btn btn-sm btn-outline-primary">詳細</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- スマホ表示：カード形式 -->
<div class="d-md-none">
    <div class="card mb-3 shadow-sm" th:each="u : ${users}">
        <div class="card-body">

            <h5 class="fw-bold">ユーザー名：<span th:text="${u.username}"></span></h5>

            <p class="mb-1">ID：<span th:text="${u.id}"></span></p>
            <p class="mb-1">メール：<span th:text="${u.email}"></span></p>
            <p class="mb-1">
                登録日：
                <span th:text="${#temporals.format(u.createdAt, 'yyyy/MM/dd')}"></span>
            </p>

            <a th:href="@{'/admin/users/' + ${u.id}}" class="btn btn-outline-primary w-100 mt-2">
                詳細を見る
            </a>

        </div>
    </div>
</div>

</body>
</html>
