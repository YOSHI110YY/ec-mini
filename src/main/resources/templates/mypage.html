<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>マイページ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- ナビバー：bg-dark に変更し、他の画面とリンク構成を統一 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand ms-3" href="/mypage">Office Station</a>

        <div class="navbar-nav me-auto align-items-center">
            <a class="nav-link" href="/products">商品一覧</a>
            <a class="nav-link" href="/cart">カート</a>
            <a class="nav-link" href="/orders">注文履歴</a>
            <a class="nav-link active" href="/mypage">マイページ</a> <!-- 現在のページを active に -->

            <!-- ログアウトフォーム：一直線に並ぶスタイル -->
            <form th:action="@{/logout}" method="post" class="d-inline m-0 ms-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="nav-link btn btn-link text-white-50 border-0 p-0"
                        style="font-size: 1rem; vertical-align: baseline;">ログアウト</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">

    <div class="row">

        <!-- 左メニュー -->
        <div class="col-3">
            <div class="list-group">
                <a href="/mypage" class="list-group-item list-group-item-action active">マイページ</a>
                <a href="/orders" class="list-group-item list-group-item-action">注文履歴</a>
                <a href="/products" class="list-group-item list-group-item-action">商品一覧</a>
            </div>
        </div>

        <!-- メインコンテンツ -->
        <div class="col-9">
            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="mb-3">ようこそ、<span th:text="${username}"></span> さん</h4>

                    <p class="text-muted">
                        こちらはマイページです。注文履歴の確認や、アカウント情報の管理ができます。
                    </p>

                    <hr>

                    <h5 class="mt-3">アカウント情報</h5>
                    <ul class="list-group">
                        <li class="list-group-item">
                            <strong>ユーザー名：</strong>
                            <span th:text="${username}"></span>
                        </li>
                        <li class="list-group-item">
                            <strong>権限：</strong>
                            <span th:text="${role}"></span>
                        </li>
                    </ul>

                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
