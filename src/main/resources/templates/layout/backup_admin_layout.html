<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">管理画面</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar {
            width: 200px;
            height: 100vh;
            background: #343a40;
            padding-top: 20px;
            position: fixed;
            overflow-y: auto;
        }
        .sidebar a {
            color: #fff;
            display: block;
            padding: 10px 20px;
            text-decoration: none;
        }
        .sidebar a:hover {
            background: #495057;
        }
        .content {
            margin-left: 220px;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <a href="/admin/products">商品管理</a>
    <a href="/admin/orders">注文管理</a>
    <a href="/admin/users">ユーザー管理</a>
    <a href="/products">サイトを見る</a>

    <form th:action="@{/logout}" method="post" style="padding: 10px 20px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn btn-danger w-100">ログアウト</button>
    </form>
</div>

<div class="content">
    <!-- ★ これが正しいフラグメント定義 -->
    <th:block th:fragment="content">
        <!-- 各ページの内容がここに入る -->
    </th:block>
</div>

</body>
</html>
