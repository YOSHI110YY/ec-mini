<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ショッピングカート</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container-fluid">

<h2 class="mb-4 border-bottom pb-2">ショッピングカート</h2>

<!-- カートが空の場合 -->
<div th:if="${#lists.isEmpty(cartItems)}" class="alert alert-info">
    カートに商品がありません。
</div>

<!-- カートに商品がある場合 -->
<div th:if="${!#lists.isEmpty(cartItems)}">

    <table class="table table-striped table-hover align-middle">
        <thead>
        <tr>
            <th>商品名</th>
            <th class="text-center">数量</th>
            <th class="text-end">単価</th>
            <th class="text-end">小計</th>
            <th></th>
        </tr>
        </thead>

        <tbody>
        <!-- ★ あなたが貼ったコードはここに入る -->
        <tr th:each="item : ${cartItems}">
            <td th:text="${item.product.name}"></td>

            <td class="text-center">
                <form th:action="@{/cart/minus}" method="post" class="d-inline">
                    <input type="hidden" name="id" th:value="${item.product.id}">
                    <button class="btn btn-outline-secondary btn-sm">−</button>
                </form>

                <span class="mx-2" th:text="${item.quantity}"></span>

                <form th:action="@{/cart/plus}" method="post" class="d-inline">
                    <input type="hidden" name="id" th:value="${item.product.id}">
                    <button class="btn btn-outline-secondary btn-sm">＋</button>
                </form>
            </td>

            <td class="text-end"
                th:text="${#numbers.formatInteger(item.product.price, 0, 'COMMA')} + '円'"></td>

            <td class="text-end"
                th:text="${#numbers.formatInteger(item.product.price * item.quantity, 0, 'COMMA')} + '円'"></td>

            <td class="text-end">
                <form th:action="@{/cart/remove}" method="post">
                    <input type="hidden" name="id" th:value="${item.product.id}">
                    <button class="btn btn-danger btn-sm">削除</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- 合計金額 -->
    <h4 class="text-end mt-4">
        合計: <span th:text="${#numbers.formatInteger(total, 0, 'COMMA')}"></span> 円
    </h4>

    <!-- 注文へ進む -->
    <div class="text-end mt-3">
        <a href="/orders/confirm" class="btn btn-primary btn-lg">注文へ進む</a>
    </div>

</div>

</body>
</html>
