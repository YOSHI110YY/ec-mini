<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注文内容の確認</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container-fluid">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <a class="navbar-brand ms-3" href="/mypage">Office Station</a>
    <div class="navbar-nav ms-3">
        <a class="nav-link" href="/products">商品一覧</a>
        <a class="nav-link" href="/cart">カート</a>
        <a class="nav-link" href="/orders">注文履歴</a>
        <a class="nav-link" href="/mypage">マイページ</a>
        <a class="nav-link" href="/logout">ログアウト</a>
    </div>
</nav>

<div class="row">

    <aside class="col-3">
        <div class="list-group mb-4">
            <a class="list-group-item active">ショップガイド</a>
            <a class="list-group-item">ご購入方法</a>
            <a class="list-group-item">お支払い方法</a>
            <a class="list-group-item">配送料</a>
            <a class="list-group-item">返品・交換</a>
        </div>
    </aside>

    <main class="col-9">

        <h2 class="mb-4">注文内容の確認</h2>

        <table class="table table-striped">
            <thead>
            <tr>
                <th>商品名</th>
                <th>数量</th>
                <th>金額</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.name}"></td>
                <td th:text="${item.quantity}"></td>
                <td th:text="${item.subtotal} + '円'"></td>
            </tr>
            </tbody>
        </table>

        <p class="fw-bold mt-3">
            合計金額：<span th:text="${total}"></span>円
        </p>

        <form th:action="@{/orders/complete}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-primary">注文を確定する</button>
        </form>

    </main>
</div>

</body>
</html>
