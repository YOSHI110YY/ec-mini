<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注文履歴</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- ナビバー -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Office Station</a>

        <div class="d-flex">
            <form th:action="@{/logout}" method="post" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-light btn-sm">ログアウト</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="row">

        <!-- 左メニュー -->
        <div class="col-3">
            <div class="list-group">
                <a href="/mypage" class="list-group-item list-group-item-action">マイページ</a>
                <a href="/orders" class="list-group-item list-group-item-action active">注文履歴</a>
                <a href="/products" class="list-group-item list-group-item-action">商品一覧</a>
            </div>
        </div>

        <!-- メインコンテンツ -->
        <div class="col-9">
            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="mb-3">注文履歴</h4>

                    <p class="text-muted">
                        過去の注文を確認できます。
                    </p>

                    <table class="table table-striped mt-3">
                        <thead>
                        <tr>
                            <th>注文番号</th>
                            <th>注文日</th>
                            <th>合計金額</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="order : ${orders}">
                            <td th:text="${order.id}"></td>
                            <td th:text="${#temporals.format(order.orderDate, 'yyyy/MM/dd HH:mm')}"></td>
                            <td th:text="${#numbers.formatInteger(order.totalPrice)} + '円'"></td>
                            <td>
                                <a th:href="@{'/orders/' + ${order.id}}"
                                   class="btn btn-outline-primary btn-sm">
                                    詳細
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
