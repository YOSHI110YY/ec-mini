<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注文詳細</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container-fluid">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand ms-3" href="/mypage">Office Station</a>

        <button class="btn btn-outline-light d-md-none me-2"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#sidebarMenu">
            メニュー
        </button>

        <div class="navbar-nav me-auto align-items-center">
            <a class="nav-link" href="/products">商品一覧</a>
            <a class="nav-link" href="/cart">カート</a>
            <a class="nav-link active" href="/orders">注文履歴</a>
            <a class="nav-link" href="/mypage">マイページ</a>
        </div>
    </div>
</nav>

<div class="row px-3">

    <div class="col-md-3 d-none d-md-block">
        <div class="list-group mb-4">
            <a href="/mypage" class="list-group-item list-group-item-action">マイページ</a>
            <a href="/orders" class="list-group-item list-group-item-action active">注文履歴</a>
            <a href="/products" class="list-group-item list-group-item-action">商品一覧</a>
            <a href="/cart" class="list-group-item list-group-item-action">カート</a>
        </div>
    </div>

    <main class="col-md-9">

        <h2 class="mb-4 border-bottom pb-2">注文詳細</h2>

        <!-- 注文情報 -->
        <div class="mb-4">
            <p><strong>注文番号：</strong> <span th:text="${order.id}"></span></p>
            <p><strong>注文日時：</strong> <span th:text="${#temporals.format(order.createdAt, 'yyyy/MM/dd HH:mm')}"></span></p>
            <p><strong>合計金額：</strong> <span th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA')}"></span> 円</p>
            <p><strong>ステータス：</strong> <span th:text="${order.status}"></span></p>
        </div>

        <!-- 注文商品一覧 -->
        <h4 class="border-bottom pb-2">注文商品</h4>

        <p th:if="${order.items == null or #lists.isEmpty(order.items)}"
           class="text-muted mt-3">
            注文商品がありません。
        </p>

        <div th:if="${order.items != null and !#lists.isEmpty(order.items)}" class="table-responsive">
            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>商品名</th>
                    <th>数量</th>
                    <th>価格</th>
                    <th>小計</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.product.name}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${#numbers.formatInteger(item.price, 0, 'COMMA')} + '円'"></td>
                    <td th:text="${#numbers.formatInteger(item.price * item.quantity, 0, 'COMMA')} + '円'"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <a href="/orders" class="btn btn-secondary mt-3">注文履歴に戻る</a>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
