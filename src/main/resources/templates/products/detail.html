<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name}">商品詳細</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f6f8;
        }

        main {
            background: #ffffff;
            border-radius: 14px;
            padding: 24px;
        }

        .btn {
            border-radius: 10px;
        }

        .product-detail-image {
            max-height: 420px;
            object-fit: cover;
            width: 100%;
            border-radius: 14px;
        }
    </style>

</head>

<body class="container-fluid">

<!-- ナビバー（一覧ページと統一） -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand ms-3" href="/mypage">Fit Deli</a>

        <!-- スマホ用メニューボタン -->
        <button class="btn btn-outline-light d-md-none me-2"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#sidebarMenu">
            メニュー
        </button>

        <div class="navbar-nav me-auto align-items-center">
            <a class="nav-link" href="/products">商品一覧</a>
            <a class="nav-link text-white" href="/cart">カート</a>
            <a class="nav-link text-white" href="/orders">注文履歴</a>
            <a class="nav-link text-white" href="/mypage">マイページ</a>

            <form th:action="@{/logout}" method="post" class="d-inline m-0 ms-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="nav-link btn btn-link text-white-50 border-0 p-0">
                    ログアウト
                </button>
            </form>
        </div>


    </div>
</nav>

<!-- スマホ用オフキャンバスサイドバー -->
<div class="offcanvas offcanvas-start d-md-none" tabindex="-1" id="sidebarMenu">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">メニュー</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">
        <div class="list-group mb-4">
            <a href="/mypage" class="list-group-item list-group-item-action">マイページ</a>
            <a href="/orders" class="list-group-item list-group-item-action">注文履歴</a>
            <a href="/products" class="list-group-item list-group-item-action">商品一覧</a>
        </div>

        <div class="list-group shadow-sm">
            <div class="list-group-item bg-primary text-white fw-bold">カテゴリ検索</div>
            <a th:href="@{/products(category='MAIN')}" class="list-group-item list-group-item-action">MAIN</a>
            <a th:href="@{/products(category='LOW CARB')}" class="list-group-item list-group-item-action">LOW CARB</a>
            <a th:href="@{/products(category='PROTEIN')}" class="list-group-item list-group-item-action">PROTEIN</a>
            <a th:href="@{/products(category='SIDE DISH')}" class="list-group-item list-group-item-action">SIDE DISH</a>
            <a th:href="@{/products}" class="list-group-item list-group-item-action list-group-item-secondary">全件表示</a>
        </div>
    </div>
</div>

<div class="row px-3">

    <!-- PC用サイドバー -->
    <div class="col-md-3 d-none d-md-block">
        <div class="list-group mb-4">
            <a href="/mypage" class="list-group-item list-group-item-action">マイページ</a>
            <a href="/orders" class="list-group-item list-group-item-action">注文履歴</a>
            <a href="/products" class="list-group-item list-group-item-action">商品一覧</a>
        </div>
    </div>

    <!-- メイン -->
    <main class="col-md-9">

        <h2 class="mb-4 border-bottom pb-2" th:text="${product.name}"></h2>

        <div class="row">

            <!-- 画像（スマホでは上、PCでは左） -->
            <div class="col-12 col-md-5 mb-3">
                <img th:if="${product.image != null}"
                     th:src="@{/uploads/{filename}(filename=${product.image})}"
                     class="img-fluid border shadow-sm product-detail-image"
                     alt="商品画像">

                <img th:unless="${product.image != null}"
                     th:src="@{/images/noimage.png}"
                     class="img-fluid border shadow-sm product-detail-image"
                     alt="NO IMAGE">
            </div>

            <!-- 商品情報 -->
            <div class="col-12 col-md-7">

                <p class="fs-4 fw-bold text-primary">
                    <span th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')}"></span> 円
                </p>

                <!-- ▼ 在庫表示 -->
                <p th:if="${product.stock > 0}" class="text-success fw-bold">
                    在庫あり（残り [[${product.stock}]] 点）
                </p>
                <p th:if="${product.stock == 0}" class="text-danger fw-bold">
                    在庫なし
                </p>

                <p class="text-muted" th:text="${product.description}"></p>

                <!-- ▼ カートボタン（在庫ありの場合のみ表示） -->
                <div th:if="${product.stock > 0}">

                    <form th:action="@{'/cart/add/' + ${product.id}}"
                          method="post">

                        <button type="submit"
                                class="btn btn-primary w-100 py-2">
                            カートに追加
                        </button>

                    </form>

                </div>

                <!-- ▼ 在庫なしの場合のボタン -->
                <div th:if="${product.stock == 0}" class="mt-3">
                    <button class="btn btn-secondary w-100 py-2" disabled>在庫なし</button>
                </div>

                <a href="/products" class="btn btn-outline-secondary w-100 mt-2">
                    商品一覧に戻る
                </a>

                <hr class="my-4">

                <h4 class="mb-3">関連商品</h4>

                <div class="row g-2" th:if="${relatedProducts != null and !#lists.isEmpty(relatedProducts)}">

                    <div class="col-4 col-md-2" th:each="p : ${relatedProducts}">
                        <a th:href="@{'/products/' + ${p.id}}" class="text-decoration-none text-dark">

                            <div class="card border-0">
                                <img th:if="${p.image != null}"
                                     th:src="@{/uploads/{filename}(filename=${p.image})}"
                                     class="card-img-top"
                                     style="height: 80px; object-fit: cover; border-radius: 6px;">

                                <img th:unless="${p.image != null}"
                                     th:src="@{/images/noimage.png}"
                                     class="card-img-top"
                                     style="height: 80px; object-fit: cover; border-radius: 6px;">

                                <div class="card-body p-1">
                                    <p class="small text-truncate mb-1" th:text="${p.name}"></p>
                                    <p class="text-primary small mb-0">
                                        <span th:text="${p.price}"></span>円
                                    </p>
                                </div>
                            </div>

                        </a>
                    </div>

                </div>

                <p th:if="${relatedProducts == null or #lists.isEmpty(relatedProducts)}"
                   class="text-muted">
                    関連商品はありません。
                </p>

            </div>
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<footer class="text-center text-muted py-4 mt-5">
    <small>
        © 2026 Fit Deli. Healthy frozen meals for everyday life.
    </small>
</footer>

</body>
</html>
