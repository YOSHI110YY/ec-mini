<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container d-flex justify-content-center align-items-center" style="height: 100vh;">

<div class="card shadow-sm p-4" style="width: 360px;">

    <h3 class="text-center mb-3">ログイン</h3>

    <!-- ログアウト後のメッセージ -->
    <div th:if="${param.logout}" class="alert alert-info py-2">
        ログアウトしました。
    </div>

    <!-- エラーメッセージ -->
    <div th:if="${param.error}" class="alert alert-danger py-2">
        ユーザー名またはパスワードが違います。
    </div>

    <form th:action="@{/login}" method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <div class="mb-3">
            <label class="form-label">ユーザー名</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">パスワード</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <!-- ✔ ログインボタン-->
        <button type="submit" class="btn btn-primary w-100">
            ログイン
        </button>

    </form>

    <div class="text-center mt-3">
        <a href="#" class="text-decoration-none">パスワードをお忘れの方はこちら</a>
    </div>

</div>

</body>
</html>
