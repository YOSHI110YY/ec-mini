<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background:
                    linear-gradient(rgba(255,255,255,0.55), rgba(255,255,255,0.55)),
                    url('/images/login-bg-v2.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>

</head>

<body class="container d-flex justify-content-center align-items-center" style="height: 100vh;">

<div class="card shadow-lg border-0 p-4"
     style="width: 380px; border-radius: 18px; background: rgba(255,255,255,0.90);">

    <h2 class="text-center fw-bold mb-1">Fit Deli</h2>

    <p class="text-center text-muted mb-4">
        Healthy frozen meals for everyday life.
    </p>

    <h4 class="text-center fw-bold mb-4">
        Sign In
    </h4>

    <!-- ログアウト後のメッセージ -->
    <div th:if="${param.logout}" class="alert alert-info py-2">
        ログアウトしました。
    </div>

    <!-- エラーメッセージ -->
    <div th:if="${param.error}" class="alert alert-danger py-2">
        ユーザー名またはパスワードが違います。
    </div>

    <form th:action="@{/login}" method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <div class="mb-3">
            <label class="form-label">ユーザー名</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">パスワード</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <!-- ✔ ログインボタン-->
        <button type="submit" class="btn btn-primary w-100">
            ログイン
        </button>

    </form>

    <div class="text-center mt-3">
        <p class="text-muted small mb-0">
            テスト用ログイン情報は README をご確認ください。
        </p>
    </div>

</div>

</body>
</html>
