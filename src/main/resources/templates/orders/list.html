<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>注文履歴 | Fit Deli</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: #f5f6f8;
        }

        .orders-container {
            max-width: 1100px;
        }

        .orders-card {
            border-radius: 14px;
            border: none;
        }

        .btn {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand ms-3" href="/products">
            Fit Deli
        </a>

        <div class="navbar-nav ms-3">
            <a class="nav-link" href="/products">商品一覧</a>
            <a class="nav-link" href="/cart">カート</a>
            <a class="nav-link active" href="/orders">注文履歴</a>
            <a class="nav-link" href="/mypage">マイページ</a>
        </div>
    </div>
</nav>

<div class="container orders-container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="mb-0">
            注文履歴
        </h2>

        <a href="/products"
           class="btn btn-outline-secondary">
            商品一覧へ戻る
        </a>

    </div>

    <div th:if="${#lists.isEmpty(orders)}"
         class="alert alert-info bg-white shadow-sm border-0">
        注文履歴がありません。
    </div>

    <div th:if="${!#lists.isEmpty(orders)}"
         class="card orders-card shadow-sm">

        <div class="card-body p-0">

            <div class="table-responsive">

                <table class="table table-hover align-middle mb-0">

                    <thead class="table-light">
                    <tr>
                        <th>注文番号</th>
                        <th>注文日</th>
                        <th>合計金額</th>
                        <th>ステータス</th>
                        <th></th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="o : ${orders}">
                        <td>
                            #<span th:text="${o.id}"></span>
                        </td>

                        <td th:text="${#temporals.format(o.createdAt, 'yyyy/MM/dd HH:mm')}"></td>

                        <td class="fw-bold">
                            <span th:text="${#numbers.formatInteger(o.totalPrice, 0, 'COMMA')}"></span>円
                        </td>

                        <td>
                            <span th:if="${o.status == 'ORDERED'}"
                                  class="badge bg-warning text-dark">
                                注文受付
                            </span>

                            <span th:if="${o.status == 'SHIPPED'}"
                                  class="badge bg-success">
                                発送済み
                            </span>

                            <span th:if="${o.status == 'CANCELED'}"
                                  class="badge bg-danger">
                                CANCELED
                            </span>

                            <span th:if="${o.status == null}"
                                  class="badge bg-secondary">
                                未設定
                            </span>
                        </td>

                        <td class="text-end">
                            <a th:href="@{'/orders/' + ${o.id}}"
                               class="btn btn-sm btn-outline-primary">
                                詳細
                            </a>
                        </td>
                    </tr>
                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<footer class="text-center text-muted py-4 mt-5">
    <small>
        © 2026 Fit Deli. Healthy frozen meals for everyday life.
    </small>
</footer>

</body>
</html>
