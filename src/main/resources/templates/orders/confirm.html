<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注文内容の確認</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background:
                    linear-gradient(rgba(255,255,255,0.90), rgba(255,255,255,0.90)),
                    url('/images/bg-food.jpg');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        main {
            background: rgba(255,255,255,0.82);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(3px);
        }

        .card {
            background: rgba(255,255,255,0.92);
        }

        .btn {
            border-radius: 10px;
        }
    </style>


</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <a class="navbar-brand ms-3" href="/mypage">Fit Deli</a>
    <div class="navbar-nav ms-3">
        <a class="nav-link" href="/products">商品一覧</a>
        <a class="nav-link" href="/cart">カート</a>
        <a class="nav-link" href="/orders">注文履歴</a>
        <a class="nav-link" href="/mypage">マイページ</a>
        <a class="nav-link" href="/logout">ログアウト</a>
    </div>
</nav>

<div class="row">

    <main class="container py-4" style="max-width: 1000px;">

        <h2 class="mb-4">注文内容の確認</h2>

        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-0">

                <table class="table align-middle mb-0">
            <thead>
            <tr>
                <th>商品名</th>
                <th>数量</th>
                <th>金額</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.name}"></td>
                <td th:text="${item.quantity}"></td>
                <td th:text="${item.subtotal} + '円'"></td>
            </tr>
            </tbody>
        </table>
            </div>
        </div>

        <p class="fw-bold fs-4 text-end mt-4">
            合計金額：<span th:text="${total}"></span>円
        </p>

        <form th:action="@{/orders/complete}"
              method="post"
              class="text-end mt-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-primary btn-lg px-5">注文を確定する</button>
        </form>

    </main>
</div>

<footer class="text-center text-muted py-4 mt-5">
    <small>
        © 2026 Fit Deli. Healthy frozen meals for everyday life.
    </small>
</footer>

</body>
</html>
