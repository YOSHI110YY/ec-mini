<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>注文完了 | Fit Deli</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: #f5f6f8;
        }

        .complete-card {
            max-width: 720px;
            border-radius: 18px;
        }

        .check-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #198754;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 20px;
        }

        .btn {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container-fluid">
        <a class="navbar-brand ms-3" href="/products">
            Fit Deli
        </a>

        <div class="navbar-nav ms-3">
            <a class="nav-link" href="/products">商品一覧</a>
            <a class="nav-link" href="/cart">カート</a>
            <a class="nav-link" href="/orders">注文履歴</a>
            <a class="nav-link" href="/mypage">マイページ</a>
        </div>
    </div>
</nav>

<div class="container py-5">

    <div class="card complete-card shadow-sm border-0 mx-auto">

        <div class="card-body text-center p-5">

            <div class="check-icon">
                ✓
            </div>

            <h2 class="fw-bold mb-3">
                ご注文ありがとうございました
            </h2>

            <p class="text-muted mb-4">
                ご注文を受け付けました。<br>
                冷凍弁当の発送準備が整い次第、順次お届けいたします。
            </p>

            <div class="alert alert-light border text-start mb-4">
                <p class="mb-1">
                    <strong>注文ステータス：</strong>
                    ORDERED
                </p>
                <p class="mb-0 text-muted">
                    管理画面から発送状況を確認・更新できます。
                </p>
            </div>

            <div class="d-flex justify-content-center gap-2">

                <a href="/orders"
                   class="btn btn-primary px-4">
                    注文履歴を見る
                </a>

                <a href="/products"
                   class="btn btn-outline-secondary px-4">
                    商品一覧へ戻る
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
