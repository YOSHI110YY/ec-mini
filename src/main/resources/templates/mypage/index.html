<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>マイページ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- ナビバー -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Office Station</a>

        <div class="d-flex">
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="nav-link btn btn-link text-white border-0"
                        style="padding: 0; vertical-align: middle;">
                    ログアウト
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="row">

        <!-- 左メニュー -->
        <div class="col-3">
            <div class="list-group">
                <a href="/mypage" class="list-group-item list-group-item-action active">マイページ</a>
                <a href="/orders" class="list-group-item list-group-item-action">注文履歴</a>
                <a href="/products" class="list-group-item list-group-item-action">商品一覧</a>
            </div>
        </div>

        <!-- メインコンテンツ -->
        <div class="col-9">
            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="mb-3">ようこそ、<span th:text="${username}"></span> さん</h4>

                    <p class="text-muted">
                        こちらはマイページです。注文履歴の確認や、アカウント情報の管理ができます。
                    </p>

                    <hr>

                    <h5 class="mt-3">アカウント情報</h5>
                    <ul class="list-group">
                        <li class="list-group-item">
                            <strong>ユーザー名：</strong>
                            <span th:text="${username}"></span>
                        </li>
                    </ul>

                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
