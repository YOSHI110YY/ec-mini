services:
  mysql:
    image: mysql:8.0
    container_name: ecmini-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecmini
      MYSQL_USER: ecmini
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ecmini", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: ecmini-app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ecmini?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
      SPRING_DATASOURCE_USERNAME: ecmini
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_MAIL_USERNAME: dummy@example.com
      SPRING_MAIL_PASSWORD: dummy
      SPRING_SQL_INIT_MODE: always

volumes:
  mysql-data: